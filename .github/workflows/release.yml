name: Build and Release

on:
  push:
    tags:
      - 'v*' # e.g., v0.1.0, v1.2.3, v1.2.3-rc1
  workflow_dispatch:

permissions:
  contents: write # required to create releases

concurrency:
  # Don't queue builds — newer commits cancel in-flight ones.
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so release notes can diff against the previous tag

      - name: Set up mise (Bun + Rust pinned in mise.toml)
        uses: jdx/mise-action@v2
        with:
          experimental: true

      - name: Install JS dependencies
        run: |
          bun install
          bun install --cwd native

      - name: Build Rust native module (release)
        run: bun run build:rust

      - name: Bundle main / preload / renderer
        run: bun run build

      - name: Type-check
        run: bun run typecheck

      - name: Package with electron-builder
        env:
          # Stop electron-builder from trying to publish — we handle the
          # GitHub release ourselves below. (bun puts node_modules/.bin on
          # PATH when running scripts, so electron-builder resolves locally.)
          GH_TOKEN: ""
        run: bun run package:win

      - name: Read version + release metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            # Real release — use the git tag as-is, mark non-prerelease.
            TAG="${{ github.ref_name }}"
            NAME="$TAG"
            PRERELEASE=false
          else
            # Manual dispatch — synthetic build tag, mark as prerelease.
            TAG="v${VERSION}-build.${{ github.run_number }}"
            NAME="Build ${{ github.run_number }} · ${SHORT_SHA}"
            PRERELEASE=true
          fi

          {
            echo "version=$VERSION"
            echo "short_sha=$SHORT_SHA"
            echo "tag=$TAG"
            echo "name=$NAME"
            echo "prerelease=$PRERELEASE"
          } >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts (workflow-scoped)
        uses: actions/upload-artifact@v4
        with:
          name: hibiki-codex-windows-${{ steps.meta.outputs.short_sha }}
          path: |
            release/${{ steps.meta.outputs.version }}/*.exe
            release/${{ steps.meta.outputs.version }}/*.yml
            release/${{ steps.meta.outputs.version }}/*.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          body: |
            Automated build (commit ${{ github.sha }}).

            ### Downloads
            - **Setup installer** — `Hibiki Codex Setup ${{ steps.meta.outputs.version }}.exe`
            - **Portable** — `Hibiki Codex-${{ steps.meta.outputs.version }}-portable.exe`

            > Unsigned build — Windows SmartScreen will warn on first launch. Click **More info → Run anyway**.
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/${{ steps.meta.outputs.version }}/*.exe
            release/${{ steps.meta.outputs.version }}/latest.yml
            release/${{ steps.meta.outputs.version }}/*.blockmap
