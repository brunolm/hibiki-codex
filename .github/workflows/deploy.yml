name: Deploy to GitHub Pages

# Trigger only on pushes to main and manual runs. Pull-request triggers are
# intentionally absent — we never want a PR to be able to deploy to production.
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/build-docs.mjs'
      - 'package.json'
      - 'bun.lock'
      - '.tool-versions'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# Default to no permissions; each job re-declares the minimum it needs.
permissions: {}

# Only one deploy at a time. Don't cancel an in-flight deploy — let it finish
# so the live site is never left in a half-deployed state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # All third-party actions are pinned to a full commit SHA, with the
      # human-readable tag in a trailing comment.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .tool-versions

      # --ignore-scripts skips Electron's postinstall binary download — the docs
      # build only needs html-minifier-terser, not the Electron runtime.
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build docs
        run: bun run docs:build

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    # These permissions are scoped to the deploy job only and are what
    # actions/deploy-pages needs to publish via the GitHub Pages API.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
